<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatial Canvas v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;600;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--surface:rgba(12,14,22,0.96);--surface2:rgba(18,20,32,0.98);
  --border:rgba(80,90,170,0.14);--border-hi:rgba(100,120,230,0.32);
  --text:#dde2f5;--muted:#525870;--muted2:#32364e;
  --l0:#e85d5d;--l1:#f0933a;--l2:#f0c040;--l3:#4fc96e;--l4:#4a9eff;
  --gh-green:#3fb950;--gh-blue:#58a6ff;--gh-purple:#a371f7;--gh-orange:#f0883e;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text)}
#cv{position:absolute;inset:0;cursor:default}

/* ── TOPBAR ─────────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:46px;z-index:200;
  display:flex;align-items:center;
  background:rgba(6,7,12,0.94);border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.logo{padding:0 18px;font-weight:900;font-size:15px;letter-spacing:-.4px;
  border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--l4);
  box-shadow:0 0 10px var(--l4),0 0 20px rgba(74,158,255,.4)}
.topbar-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
#demo-btn{
  display:flex;align-items:center;gap:7px;padding:0 14px;height:28px;border-radius:8px;
  background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.28);
  color:var(--l4);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.2px;
}
#demo-btn:hover{background:rgba(74,158,255,.22);border-color:rgba(74,158,255,.5)}
#demo-btn .pulse{
  width:6px;height:6px;border-radius:50%;background:var(--l4);
  animation:pulseAnim 1.6s ease-in-out infinite;
}
@keyframes pulseAnim{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
.topbar-right{display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0}
#bb-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
#export-btn{
  display:flex;align-items:center;gap:6px;padding:0 12px;height:28px;border-radius:8px;
  background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.28);
  color:var(--gh-green);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
#export-btn:hover{background:rgba(63,185,80,.22)}

/* ── LEFT TOOLBAR ───────────────────────────────────── */
#toolbar{
  position:fixed;left:12px;top:50%;transform:translateY(-50%);
  z-index:200;display:flex;flex-direction:column;gap:5px;
}
.tool{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .18s;outline:none;position:relative;
  backdrop-filter:blur(12px);
}
.tool:hover{border-color:var(--border-hi);color:var(--text)}
.tool.active{border-color:var(--l4);color:var(--l4);background:rgba(74,158,255,.12)}
.tool-sep{height:1px;background:var(--border);margin:2px 5px}
.tt{
  position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);
  background:var(--surface2);border:1px solid var(--border);
  padding:3px 9px;border-radius:6px;white-space:nowrap;
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text);letter-spacing:.3px;
  opacity:0;pointer-events:none;transition:opacity .15s;
}
.tool:hover .tt{opacity:1}

/* ── LAYER PANEL ────────────────────────────────────── */
#layer-panel{
  position:fixed;right:12px;top:50%;transform:translateY(-50%);
  z-index:200;width:210px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;backdrop-filter:blur(20px);
  transition:opacity .3s,transform .3s;
}
#layer-panel.hidden{opacity:0;pointer-events:none;transform:translateY(-50%) translateX(10px)}
#lp-head{
  padding:9px 13px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
#lp-head span{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
#add-layer-btn{
  width:20px;height:20px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
#add-layer-btn:hover{border-color:var(--l4);color:var(--l4)}
#layers-list{padding:6px;max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.layer-item{
  border-radius:8px;border:1px solid transparent;padding:6px 8px;
  cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:7px;
}
.layer-item:hover{border-color:var(--border);background:rgba(255,255,255,.02)}
.layer-item.active{border-color:var(--border-hi);background:rgba(74,158,255,.07)}
.l-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;
  box-shadow:0 0 6px currentColor}
.l-label{flex:1;font-size:11px;font-weight:600;outline:none;background:transparent;
  border:none;color:var(--text);cursor:pointer;min-width:0}
.l-label:focus{background:rgba(255,255,255,.06);border-radius:4px;padding:0 3px;cursor:text}
.l-z{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);flex-shrink:0}
.l-count{font-family:'JetBrains Mono',monospace;font-size:9px;
  background:rgba(255,255,255,.06);border-radius:4px;padding:1px 5px;color:var(--muted)}
.l-del{
  width:16px;height:16px;border-radius:4px;background:transparent;border:none;
  color:var(--muted2);cursor:pointer;font-size:11px;
  display:none;align-items:center;justify-content:center;flex-shrink:0;
}
.layer-item:hover .l-del{display:flex}
.l-del:hover{color:var(--l0)}
#lp-foot{padding:10px 13px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.sl-row{display:flex;flex-direction:column;gap:4px}
.sl-row label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);
  display:flex;justify-content:space-between}
.sl-row label span{color:var(--l4)}
input[type=range]{width:100%;accent-color:var(--l4);cursor:pointer;height:3px}

/* ── BOTTOM BAR ─────────────────────────────────────── */
#bottom{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  z-index:200;display:flex;align-items:center;gap:7px;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;
  padding:6px 12px;backdrop-filter:blur(20px);
}
.bb{
  padding:4px 13px;border-radius:999px;font-family:'Outfit',sans-serif;
  font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;
  outline:none;border:1px solid transparent;letter-spacing:.2px;
}
#bb-add{background:rgba(74,158,255,.12);border-color:rgba(74,158,255,.32);color:var(--l4)}
#bb-add:hover{background:rgba(74,158,255,.26)}
#bb-clear{background:rgba(232,93,93,.08);border-color:rgba(232,93,93,.22);color:var(--l0)}
#bb-clear:hover{background:rgba(232,93,93,.2)}
#bb-layers{background:transparent;border-color:var(--border);color:var(--muted)}
#bb-layers:hover{color:var(--text);border-color:var(--border-hi)}

/* ── AXIS LEGEND ─────────────────────────────────────── */
#axis-legend{
  position:fixed;bottom:60px;right:14px;z-index:200;
  display:flex;flex-direction:column;gap:6px;pointer-events:none;
}
.axis-tag{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.5px;
  padding:3px 9px;border-radius:6px;opacity:0.7;
  display:flex;align-items:center;gap:5px;
}
.axis-tag .ax-label{font-weight:700}
.ax-x{background:rgba(240,147,58,.1);border:1px solid rgba(240,147,58,.25);color:#f0933a}
.ax-y{background:rgba(79,201,110,.1);border:1px solid rgba(79,201,110,.25);color:#4fc96e}
.ax-z{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.25);color:#4a9eff}

/* ── AXIS GRID OVERLAY ───────────────────────────────── */
#axis-overlay{
  position:fixed;top:46px;left:0;right:0;bottom:0;z-index:1;
  pointer-events:none;
}

/* ── MODE BADGE ─────────────────────────────────────── */
#mode-badge{
  position:fixed;top:56px;left:50%;transform:translateX(-50%);
  z-index:200;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.8px;
  padding:3px 11px;border-radius:999px;opacity:0;transition:opacity .3s;pointer-events:none;
}
#mode-badge.show{opacity:1}
#mode-badge.draw{background:rgba(240,147,58,.1);border:1px solid rgba(240,147,58,.28);color:var(--gh-orange)}
#mode-badge.focus{background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.24);color:var(--l4)}

/* ── DEMO GUIDE ─────────────────────────────────────── */
#guide{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  z-index:300;width:560px;max-width:calc(100vw - 32px);
  background:var(--surface2);border:1px solid var(--border-hi);border-radius:16px;
  padding:20px 22px;display:none;flex-direction:column;gap:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 1px rgba(74,158,255,.08);
  animation:guideIn .3s cubic-bezier(.34,1.3,.64,1);
}
@keyframes guideIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#guide.open{display:flex}
#guide-progress{display:flex;gap:5px;align-items:center}
.g-step{
  height:3px;flex:1;border-radius:999px;background:var(--muted2);
  transition:background .4s,box-shadow .4s;
}
.g-step.done{background:var(--l4);box-shadow:0 0 8px rgba(74,158,255,.5)}
.g-step.active{background:var(--l4);animation:stepPulse 1.5s ease-in-out infinite}
@keyframes stepPulse{0%,100%{opacity:1}50%{opacity:.5}}
#guide-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--l4);
  letter-spacing:1px;text-transform:uppercase}
#guide-title{font-size:16px;font-weight:800;line-height:1.3}
#guide-title em{font-style:normal;color:var(--l4)}
#guide-body{font-size:12px;color:var(--muted);line-height:1.65;font-weight:400}
#guide-body b{color:var(--text);font-weight:700}
#guide-actions{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.g-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2)}
#guide-btns{display:flex;gap:7px}
.gbtn{
  padding:6px 16px;border-radius:999px;font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;outline:none;transition:all .18s;
}
.gbtn-skip{background:transparent;border:1px solid var(--border);color:var(--muted)}
.gbtn-skip:hover{border-color:var(--text);color:var(--text)}
.gbtn-next{background:var(--l4);border:1px solid var(--l4);color:#06070c}
.gbtn-next:hover{opacity:.85;transform:scale(1.03)}

/* ── MODALS ─────────────────────────────────────────── */
.modal-back{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.68);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
}
.modal-back.open{display:flex}
.mbox{
  background:var(--surface2);border:1px solid var(--border-hi);border-radius:18px;
  padding:26px;display:flex;flex-direction:column;gap:15px;
  animation:mboxIn .22s cubic-bezier(.34,1.3,.64,1);
}
@keyframes mboxIn{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:none}}
.mfield{display:flex;flex-direction:column;gap:5px}
.mfield label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);
  letter-spacing:.6px;text-transform:uppercase}
.mfield input,.mfield textarea,.mfield select{
  background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;
  padding:8px 11px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s;resize:none;
}
.mfield input:focus,.mfield textarea:focus,.mfield select:focus{border-color:var(--l4)}
.mfield select option{background:#1a1f2e}
.mrow{display:flex;gap:10px}.mrow .mfield{flex:1}
.mbtns{display:flex;gap:7px;justify-content:flex-end;margin-top:2px}
.mbtn{padding:7px 17px;border-radius:999px;font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;outline:none;transition:all .18s}
.mbtn-c{background:transparent;border:1px solid var(--border);color:var(--muted)}
.mbtn-c:hover{border-color:var(--text);color:var(--text)}
.mbtn-ok{background:var(--l4);border:1px solid var(--l4);color:#06070c}
.mbtn-ok:hover{opacity:.85}

/* note modal */
#nm .mbox{width:400px}
#nm .mtitle{font-size:16px;font-weight:800}
#nm .mtitle em{font-style:normal;color:var(--l4)}

/* github modal */
#ghm .mbox{width:660px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
#ghm .mbox h2{font-size:17px;font-weight:900;display:flex;align-items:center;gap:9px}
#ghm .mbox h2 .tag{font-size:11px;color:var(--muted);font-weight:400;margin-left:auto;
  font-family:'JetBrains Mono',monospace}
#gh-issues-wrap{flex:1;overflow-y:auto;margin:2px 0}
#gh-issues-list{display:flex;flex-direction:column;gap:7px}
.icard{
  border:1px solid rgba(48,54,80,.9);border-radius:10px;padding:11px 13px;
  background:rgba(22,26,40,.7);display:flex;gap:11px;align-items:flex-start;
  transition:border-color .18s;
}
.icard:hover{border-color:rgba(88,166,255,.28)}
.ichk{
  width:17px;height:17px;border-radius:5px;border:2px solid var(--muted2);
  background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;font-size:10px;
  transition:all .18s;user-select:none;
}
.ichk.on{background:var(--gh-green);border-color:var(--gh-green);color:#06070c;font-weight:900}
.ibody{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.ititle{font-size:12px;font-weight:700;outline:none;background:transparent;
  border:none;color:var(--text);width:100%}
.ititle:focus{background:rgba(255,255,255,.04);border-radius:4px;padding:1px 5px}
.idesc{font-size:11px;color:var(--muted);outline:none;background:transparent;
  border:none;resize:none;width:100%;font-family:'Outfit',sans-serif;line-height:1.5}
.idesc:focus{background:rgba(255,255,255,.03);border-radius:4px;padding:2px 5px;color:var(--text)}
.imeta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.mtag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:999px;border:1px solid;}
.mtag-a{background:rgba(88,166,255,.08);border-color:rgba(88,166,255,.22);color:var(--gh-blue)}
.mtag-m{background:rgba(163,113,247,.08);border-color:rgba(163,113,247,.22);color:var(--gh-purple)}
#gh-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:11px;border-top:1px solid var(--border);margin-top:2px;
}
#gh-sel-all{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);
  cursor:pointer;transition:color .15s;letter-spacing:.3px}
#gh-sel-all:hover{color:var(--text)}
#gh-export-final{
  display:flex;align-items:center;gap:6px;
  padding:7px 18px;border-radius:999px;background:var(--gh-green);border:none;
  color:#06070c;font-family:'Outfit',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;transition:all .2s;
}
#gh-export-final:hover{opacity:.86;transform:scale(1.03)}
#gh-export-final:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* context menu */
#ctx{
  position:fixed;z-index:500;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:5px;min-width:155px;
  box-shadow:0 8px 32px rgba(0,0,0,.55);display:none;
}
.ci{
  padding:6px 11px;border-radius:7px;font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:background .14s;color:var(--text);user-select:none;
}
.ci:hover{background:rgba(255,255,255,.06)}
.ci.danger:hover{background:rgba(232,93,93,.14);color:var(--l0)}
.csep{height:1px;background:var(--border);margin:4px 0}

/* ── VIEW BUTTONS ─────────────────────────────────── */
#view-btns{
  position:fixed;top:56px;left:50%;transform:translateX(-50%);
  z-index:200;display:flex;gap:5px;
}
.vbtn{
  padding:4px 13px;border-radius:999px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:.5px;cursor:pointer;transition:all .2s;
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);backdrop-filter:blur(12px);
}
.vbtn:hover{color:var(--text);border-color:var(--border-hi)}

/* Active state: dark background + bright white text for all views */
.vbtn.active{
  color:#ffffff;
  border-color:transparent;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
  box-shadow:0 2px 12px rgba(0,0,0,.35);
}
#vbtn-free.active{background:rgba(100,110,160,.8)}
#vbtn-flat.active{ background:linear-gradient(135deg,#6366f1,#a78bfa)}

/* flatten ghost lines during flat view */
.flat-view-active .note-ghost{opacity:0.15}

/* toast */
#toast{
  position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
  z-index:600;font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:4px 14px;border-radius:999px;pointer-events:none;
  opacity:0;transition:opacity .25s;white-space:nowrap;
}
#toast.show{opacity:1}
#toast.info{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.28);color:var(--l4)}
#toast.ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.28);color:var(--gh-green)}
#toast.warn{background:rgba(240,147,58,.1);border:1px solid rgba(240,147,58,.28);color:var(--gh-orange)}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}
</style>
</head>
<body>
<div id="cv"></div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo"><div class="logo-dot"></div>SpatialCanvas <span style="font-size:10px;color:var(--muted);font-weight:400;font-family:'JetBrains Mono',monospace">v3</span></div>
  <div class="topbar-mid">
    <button id="demo-btn"><div class="pulse"></div>▶ Demo Walkthrough</button>
  </div>
  <div class="topbar-right">
    <span id="bb-count">0 notes</span>
    <button id="export-btn"><span>⬡</span> GitHub Issues</button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tool active" id="t-select">↖<div class="tt">Select / Orbit</div></button>
  <button class="tool" id="t-draw">✏<div class="tt">Draw Lines (D)</div></button>
  <div class="tool-sep"></div>
  <button class="tool" id="t-add">＋<div class="tt">Add Note (N)</div></button>
  <button class="tool" id="t-focus">◎<div class="tt">Focus Layer (F)</div></button>
  <div class="tool-sep"></div>
  <button class="tool" id="t-reset">⌂<div class="tt">Reset Camera</div></button>
  <div class="tool-sep"></div>
  <button class="tool" id="t-undo" style="opacity:0.35;font-size:18px">↩<div class="tt">Undo (Ctrl+Z)</div></button>
</div>

<!-- MODE BADGE -->
<div id="mode-badge"></div>

<!-- VIEW BUTTONS -->
<div id="view-btns">
  <button class="vbtn active" id="vbtn-free">🌐 3D</button>
  <button class="vbtn" id="vbtn-flat">📋 Flat List</button>
</div>

<!-- LAYER PANEL -->
<div id="layer-panel">
  <div id="lp-head">
    <span>Z-Axis Layers</span>
    <button id="add-layer-btn">＋</button>
  </div>
  <div id="layers-list"></div>
  <div id="lp-foot">
    <div class="sl-row">
      <label>Focus Z <span id="zf-val">—</span></label>
      <input type="range" id="zf-sl" min="-20" max="20" value="0" step="0.5">
    </div>
    <div class="sl-row">
      <label>Spread <span id="zr-val">∞</span></label>
      <input type="range" id="zr-sl" min="0" max="30" value="30" step="0.5">
    </div>
    <div class="sl-row" id="x-scroll-row" style="display:none">
      <label style="color:var(--gh-orange)">← X Scroll <span id="xs-val">0</span></label>
      <input type="range" id="xs-sl" min="-20" max="20" value="0" step="0.5"
             style="accent-color:var(--gh-orange)">
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottom">
  <button class="bb" id="bb-add">＋ Add Note</button>
  <button class="bb" id="bb-layers">Layers</button>
  <button class="bb" id="bb-clear">Clear All</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- NOTE MODAL -->
<div class="modal-back" id="nm">
  <div class="mbox">
    <div class="mtitle">New <em>Note</em></div>
    <div class="mfield"><label>Title / Idea</label><input id="nm-title" placeholder="例: ユーザー認証フロー" maxlength="80"></div>
    <div class="mfield"><label>Description</label><textarea id="nm-body" rows="3" placeholder="背景・詳細・メモ…"></textarea></div>
    <div class="mrow">
      <div class="mfield"><label>Layer / Z軸 — 抽象度</label><select id="nm-layer"></select></div>
      <div class="mfield"><label>Category / X軸</label>
        <select id="nm-category">
          <option value="ux">👤 ユーザー体験</option>
          <option value="admin">🛠 管理者体験</option>
          <option value="data">🗄️ データ</option>
          <option value="security">🔐 セキュリティ</option>
        </select>
      </div>
    </div>
    <div class="mrow">
      <div class="mfield"><label>Priority / Y軸 — 重要度</label>
        <select id="nm-priority">
          <option value="must">🔴 Must — 必須</option>
          <option value="should">🟡 Should — できれば</option>
          <option value="could">🟢 Could — あれば</option>
        </select>
      </div>
      <div class="mfield"><label>Assignee</label><input id="nm-assign" placeholder="@username"></div>
    </div>
    <div class="mfield"><label>Milestone</label><input id="nm-ms" placeholder="例: v1.0 Launch"></div>
    <div class="mbtns">
      <button class="mbtn mbtn-c" id="nm-cancel">Cancel</button>
      <button class="mbtn mbtn-ok" id="nm-ok">Place in Space →</button>
    </div>
  </div>
</div>

<!-- AXIS LEGEND -->
<div id="axis-legend">
  <div class="axis-tag ax-x"><span class="ax-label">X</span> ユーザー体験 ← → セキュリティ</div>
  <div class="axis-tag ax-y"><span class="ax-label">Y</span> Must ↑ / Should / ↓ Could</div>
  <div class="axis-tag ax-z"><span class="ax-label">Z</span> Vision（奥） → Implement（手前）</div>
</div>

<!-- GITHUB MODAL -->
<div class="modal-back" id="ghm">
  <div class="mbox">
    <h2><span>⬡</span> Export to GitHub Issues <span class="tag">Mock Preview</span></h2>
    <div class="mrow">
      <div class="mfield"><label>Repository</label><input id="gh-repo" value="team-org/sprint-2026"></div>
      <div class="mfield"><label>Project Board</label><input id="gh-proj" value="Q1 Sprint"></div>
    </div>
    <div id="gh-issues-wrap"><div id="gh-issues-list"></div></div>
    <div id="gh-foot">
      <span id="gh-sel-all">Select All</span>
      <div style="display:flex;align-items:center;gap:9px">
        <span id="gh-sel-count" style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)"></span>
        <button class="mbtn mbtn-c" id="ghm-cancel">Cancel</button>
        <button id="gh-export-final"><span>⬡</span> Create Issues</button>
      </div>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx">
  <div class="ci" id="ctx-edit">✎ Edit Note</div>
  <div class="ci" id="ctx-conv">⬡ Convert to Issue</div>
  <div class="csep"></div>
  <div class="ci danger" id="ctx-del">✕ Delete</div>
</div>

<!-- DEMO GUIDE -->
<div id="guide">
  <div id="guide-progress"></div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="guide-tag">STEP 1 / 5</span>
  </div>
  <div id="guide-title"></div>
  <div id="guide-body"></div>
  <div id="guide-actions">
    <span class="g-hint" id="guide-hint"></span>
    <div id="guide-btns">
      <button class="gbtn gbtn-skip" id="guide-skip">End Demo</button>
      <button class="gbtn gbtn-next" id="guide-next">Next →</button>
    </div>
  </div>
</div>

// THREE and OrbitControls now available via window.THREE
const OrbitControls = window.THREE.OrbitControls;
const THREE = window.THREE;

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
// X-axis: category zones (x center positions)
const CATEGORIES = {
  ux:       { label:'👤 ユーザー体験', x:-9,  color:'#f0933a' },
  admin:    { label:'🛠 管理者体験',   x:-3,  color:'#a371f7' },
  data:     { label:'🗄️ データ',       x:3,   color:'#4fc96e' },
  security: { label:'🔐 セキュリティ', x:9,   color:'#e85d5d' },
};
// Y-axis: priority levels (y positions)
const PRIORITIES = {
  must:   { label:'🔴 Must',   y:6,  color:'#e85d5d' },
  should: { label:'🟡 Should', y:2,  color:'#f0c040' },
  could:  { label:'🟢 Could',  y:-1.5, color:'#4fc96e' },
};

const APP = {
  layers:[
    {id:'l0',label:'Vision',    z:10, color:'#e85d5d'},
    {id:'l1',label:'Strategy',  z:5,  color:'#f0933a'},
    {id:'l2',label:'Feature',   z:0,  color:'#f0c040'},
    {id:'l3',label:'Design',    z:-5, color:'#4fc96e'},
    {id:'l4',label:'Implement', z:-10,color:'#4a9eff'},
  ],
  notes:[], lines:[],
  mode:'select', focusMode:false,
  activeLayerId:'l2', zFocus:0, zRange:30,
  pendingPos:null, editingNote:null,
  history:[],
  poppedLayerId: null,   // which layer is currently popped out
};

// ═══════════════════════════════════════════════════════════════
// UNDO SYSTEM
// ═══════════════════════════════════════════════════════════════
const MAX_HISTORY = 30;

function pushHistory(action) {
  APP.history.push(action);
  if (APP.history.length > MAX_HISTORY) APP.history.shift();
  updateUndoBtn();
}

function undo() {
  if (!APP.history.length) { toast('これ以上戻れません', 'warn'); return; }
  const action = APP.history.pop();
  switch (action.type) {
    case 'ADD_NOTE': {
      // Remove the note that was added
      const n = APP.notes.find(x => x.id === action.noteId);
      if (n) {
        scene.remove(n.mesh); n.tex.dispose();
        APP.notes.splice(APP.notes.indexOf(n), 1);
        updateUI(); updateFade();
        toast(`Undo: "${action.title}" を削除`, 'info');
      }
      break;
    }
    case 'DELETE_NOTE': {
      // Re-create the deleted note
      const pos = new THREE.Vector3(...action.pos);
      const restored = createNote(pos, action.data, true); // silent=true skips pushHistory
      restored.mesh.position.copy(pos);
      toast(`Undo: "${action.data.title}" を復元`, 'ok');
      break;
    }
    case 'MOVE_NOTE': {
      const n = APP.notes.find(x => x.id === action.noteId);
      if (n) {
        n.mesh.position.set(...action.prevPos);
        updateFade();
        toast('Undo: 移動を元に戻しました', 'info');
      }
      break;
    }
    case 'ADD_LINE': {
      const l = APP.lines[APP.lines.length - 1];
      if (l) {
        scene.remove(l.line); l.line.geometry.dispose();
        APP.lines.pop();
        toast('Undo: ラインを削除', 'info');
      }
      break;
    }
    case 'EDIT_NOTE': {
      const n = APP.notes.find(x => x.id === action.noteId);
      if (n) {
        n.data = {...action.prevData}; n.layerId = action.prevData.layerId;
        rebuildNote(n); updateUI();
        toast(`Undo: "${action.prevData.title}" に戻しました`, 'info');
      }
      break;
    }
  }
  updateUndoBtn();
}

function updateUndoBtn() {
  const btn = document.getElementById('t-undo');
  if (!btn) return;
  btn.style.opacity = APP.history.length ? '1' : '0.35';
  btn.title = APP.history.length ? `Undo (${APP.history.length}件)` : 'Undo (なし)';
}

let noteId = 0;

function makeTexture(title, body, color, brighten=0) {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const ctx = c.getContext('2d');
  const hex = color.replace('#','');
  let r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  // brighten: lift RGB values for flat-view recolored notes
  r=Math.min(255,r+brighten); g=Math.min(255,g+brighten); b=Math.min(255,b+brighten);

  // Outer glow
  const glow = ctx.createRadialGradient(256,256,80,256,256,280);
  glow.addColorStop(0,`rgba(${r},${g},${b},0)`);
  glow.addColorStop(1,`rgba(${r},${g},${b},0.18)`);
  ctx.fillStyle=glow; ctx.fillRect(0,0,512,512);

  // Face gradient
  const gr = ctx.createLinearGradient(30,30,512,512);
  gr.addColorStop(0,`rgba(${Math.min(255,r+30)},${Math.min(255,g+30)},${Math.min(255,b+30)},0.96)`);
  gr.addColorStop(1,`rgba(${Math.max(0,r-20)},${Math.max(0,g-20)},${Math.max(0,b-20)},0.88)`);
  rr(ctx,24,24,464,464,38); ctx.fillStyle=gr; ctx.fill();

  // Gloss top
  const gloss = ctx.createLinearGradient(0,24,0,180);
  gloss.addColorStop(0,'rgba(255,255,255,0.35)'); gloss.addColorStop(1,'rgba(255,255,255,0)');
  rr(ctx,24,24,464,220,38); ctx.fillStyle=gloss; ctx.fill();

  // Border
  rr(ctx,24,24,464,464,38);
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=2; ctx.stroke();

  // Title
  ctx.fillStyle='rgba(20,20,20,0.95)';
  ctx.font = body ? 'bold 42px "Segoe UI",Arial,sans-serif' : 'bold 48px "Segoe UI",Arial,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  // Title: max 2 lines, body area reserved below y=280
  wrapText(ctx, title||'...', 256, body?180:256, 430, 52, 2);

  // Body text
  if(body){
    ctx.fillStyle='rgba(20,20,20,0.62)';
    ctx.font='28px "Segoe UI",Arial,sans-serif';
    // Body: max 2 lines, start at y=310, stays above bottom stripe (y=460)
    wrapText(ctx, body, 256, 340, 420, 36, 2);
  }

  // Bottom stripe — layer indicator
  const stripeGr = ctx.createLinearGradient(0,464,0,488);
  stripeGr.addColorStop(0,`rgba(${r},${g},${b},0)`);
  stripeGr.addColorStop(1,`rgba(255,255,255,0.12)`);
  ctx.fillStyle=stripeGr;
  ctx.beginPath(); ctx.moveTo(62,464); ctx.lineTo(450,464); ctx.lineTo(462,488); ctx.lineTo(50,488); ctx.closePath();
  ctx.fill();

  return new THREE.CanvasTexture(c);
}

function rr(ctx,x,y,w,h,rad){
  ctx.beginPath();ctx.moveTo(x+rad,y);ctx.lineTo(x+w-rad,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+rad);ctx.lineTo(x+w,y+h-rad);
  ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);ctx.lineTo(x+rad,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-rad);ctx.lineTo(x,y+rad);
  ctx.quadraticCurveTo(x,y,x+rad,y);ctx.closePath();
}
function wrapText(ctx, text, x, y, mw, lh, maxLines=3) {
  // Character-by-character wrapping for Japanese + word wrapping for Latin
  const chars = [...text]; // spread handles emoji & surrogate pairs
  const lines = [];
  let line = '';
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > mw && line !== '') {
      lines.push(line);
      if (lines.length >= maxLines) break;
      line = ch;
    } else {
      line = test;
    }
  }
  if (lines.length < maxLines && line) lines.push(line);

  // Truncate last line with ellipsis if text was cut
  if (lines.length === maxLines) {
    let last = lines[maxLines - 1];
    while (last.length > 0 && ctx.measureText(last + '…').width > mw) {
      last = [...last].slice(0, -1).join('');
    }
    lines[maxLines - 1] = last + (text !== lines.join('') ? '…' : '');
  }

  const sy = y - (lines.length - 1) * lh / 2;
  lines.forEach((l, i) => ctx.fillText(l, x, sy + i * lh));
}


// ① Scale proportional to Z distance from camera (inverse distance law)
// Camera rests at Z+24. Reference point Z=0 → dist=24 → scale=1.0
function layerScale(layerId) {
  const layer = APP.layers.find(l=>l.id===layerId) || APP.layers[2];
  const camZ = 24;
  const refDist = camZ;          // distance at Z=0 → scale 1.0
  const dist = Math.abs(camZ - layer.z);
  const raw = refDist / dist;
  // Clamp so nothing gets too big or too small
  return Math.min(1.25, Math.max(0.55, raw));
}

// Apply scale to a note (used on creation and after layer change)
function applyLayerScale(n) {
  const s = layerScale(n.layerId);
  n._baseScale = s;
  n.mesh.scale.setScalar(s);
}

function createNote(pos, data, silent=false) {
  const id = ++noteId;
  const layer = APP.layers.find(l=>l.id===data.layerId) || APP.layers[2];
  const tex = makeTexture(data.title, data.body, layer.color);

  // Geometry — slightly beveled look via BoxGeometry
  const geo = new THREE.BoxGeometry(2.3, 2.3, 0.11);
  const mats = Array(6).fill(null).map((_,i) =>
    i===4
      ? new THREE.MeshStandardMaterial({map:tex, roughness:0.22, metalness:0.05})
      : new THREE.MeshStandardMaterial({color:new THREE.Color(layer.color), roughness:0.42, metalness:0.18})
  );
  const mesh = new THREE.Mesh(geo, mats);
  mesh.position.copy(pos);
  mesh.castShadow = true;
  mesh.userData = {id, type:'note', layerId:data.layerId};
  scene.add(mesh);

  // Glow ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(1.35, 0.022, 8, 40),
    new THREE.MeshBasicMaterial({color:new THREE.Color(layer.color), transparent:true, opacity:0.5})
  );
  ring.rotation.x = Math.PI/2; mesh.add(ring);

  // Bottom accent bar
  const bar = new THREE.Mesh(
    new THREE.BoxGeometry(2.3, 0.1, 0.13),
    new THREE.MeshBasicMaterial({color:new THREE.Color(layer.color), transparent:true, opacity:0.8})
  );
  bar.position.y = -1.2; bar.position.z = 0.01; mesh.add(bar);

  const n = {id, mesh, ring, tex, data:{...data}, layerId:data.layerId, layer};
  APP.notes.push(n);
  n._baseScale = layerScale(data.layerId);

  // Entrance spring animation
  mesh.scale.setScalar(0);
  let t=0;
  (function spring(){
    t += 0.065;
    const s = t<1 ? 1-Math.pow(1-t,3)+Math.sin(t*Math.PI)*.08 : 1;
    const targetS = layerScale(data.layerId);
    mesh.scale.setScalar(Math.min(targetS*1.08, s * targetS));
    if(t<1.3) requestAnimationFrame(spring); else mesh.scale.setScalar(targetS);
  })();

  updateUI(); updateFade();
  if (!silent) {
    toast(`"${data.title}" → ${layer.label}`, 'ok');
    pushHistory({type:'ADD_NOTE', noteId:id, title:data.title});
  }
  return n;
}

function rebuildNote(n) {
  const layer = APP.layers.find(l=>l.id===n.layerId) || APP.layers[2];
  n.layer = layer;
  n.tex.dispose();
  n.tex = makeTexture(n.data.title, n.data.body, layer.color);
  n.mesh.material[4].map = n.tex; n.mesh.material[4].needsUpdate = true;
  n.mesh.material.forEach((m,i)=>{ if(i!==4) m.color.set(new THREE.Color(layer.color)); m.needsUpdate=true; });
  n.ring.material.color.set(new THREE.Color(layer.color));
  n.mesh.children.forEach(c=>{ if(c.isMesh) c.material.color.set(new THREE.Color(layer.color)); });
  // Reapply scale in case layerId changed
  n._baseScale = layerScale(n.layerId);
  n.mesh.scale.setScalar(n._baseScale);
}

// ═══════════════════════════════════════════════════════════════
// VIEW COLOR SYSTEM
// ═══════════════════════════════════════════════════════════════

// Apply a new color to a note's mesh materials + face texture
// ── View color: which color to use per note in each flat mode ────
function viewColor(n, mode) {
  switch(mode){
    case 'xy': case 'zy': return (PRIORITIES[n.data?.priority] || PRIORITIES.should).color;
    case 'zx': return (CATEGORIES[n.data?.category] || CATEGORIES.ux).color;
    case 'flat': return (CATEGORIES[n.data?.category] || CATEGORIES.ux).color;
    default: return null;
  }
}

// Switch a note to MeshBasicMaterial for flat view (always bright, no lighting)
function enterFlatMaterial(n, color) {
  if (n._flatMats) return; // already switched
  const layer = APP.layers.find(l=>l.id===n.layerId)||APP.layers[2];
  const faceColor = color || layer.color;
  const sideColor = color || layer.color;

  // Save original materials
  n._flatMats = n.mesh.material.slice();

  // Build MeshBasicMaterial set
  const faceTex = makeTexture(n.data.title, n.data.body, faceColor, 40);
  if(n._viewTex) n._viewTex.dispose();
  n._viewTex = faceTex;

  const newMats = n._flatMats.map((_, i) =>
    i === 4
      ? new THREE.MeshBasicMaterial({ map: faceTex })
      : new THREE.MeshBasicMaterial({ color: new THREE.Color(sideColor) })
  );
  n.mesh.material = newMats;
  n.ring.material.color.set(new THREE.Color(faceColor));
  n.ring.material.opacity = 0.55;
  n.mesh.children.forEach(c => {
    if(c.isMesh) c.material.color.set(new THREE.Color(sideColor));
  });
}

// Restore original MeshStandardMaterial
function exitFlatMaterial(n) {
  if (!n._flatMats) return;
  // Dispose the basic materials we created
  n.mesh.material.forEach((m, i) => { if(i !== 4) m.dispose(); });
  if(n._viewTex){ n._viewTex.dispose(); n._viewTex = null; }
  n.mesh.material = n._flatMats;
  n._flatMats = null;
  // Restore original face texture
  n.mesh.material[4].map = n.tex;
  n.mesh.material[4].needsUpdate = true;
  const layer = APP.layers.find(l=>l.id===n.layerId)||APP.layers[2];
  n.mesh.material.forEach((m,i)=>{ if(i!==4){ m.color.set(new THREE.Color(layer.color)); m.needsUpdate=true; }});
  n.ring.material.color.set(new THREE.Color(layer.color));
  n.ring.material.opacity = 0.55;
  n.mesh.children.forEach(c=>{ if(c.isMesh) c.material.color.set(new THREE.Color(layer.color)); });
}

function recolorForView(mode) {
  APP.notes.forEach(n => {
    exitFlatMaterial(n); // reset first
    enterFlatMaterial(n, viewColor(n, mode));
  });
}

function recolorRestore() {
  APP.notes.forEach(n => exitFlatMaterial(n));
}

// Legacy stubs kept for compatibility
function applyNoteColor(n, color) { enterFlatMaterial(n, color); }
function restoreNoteColor(n) { exitFlatMaterial(n); }
function applyFlatEmissive(n) { enterFlatMaterial(n, null); }

// ═══════════════════════════════════════════════════════════════
// RAYCASTER / INTERACTION
// ═══════════════════════════════════════════════════════════════
const rc = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const dragPlane = new THREE.Plane();
let dragTarget=null, dragOffset=new THREE.Vector3();
let isDrawing=false, drawPts=[], liveDrawLine=null;

function setNDC(e){
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
}
function noteMeshes(){ return APP.notes.map(n=>n.mesh); }

renderer.domElement.addEventListener('dblclick', e => {
  if(APP.mode!=='select') return;
  setNDC(e); rc.setFromCamera(mouse,camera);
  if(rc.intersectObjects(noteMeshes(),false).length) return;
  const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
  const base = camera.position.clone().add(dir.multiplyScalar(11));
  // snap to half-unit grid first, then find free spot
  base.x = Math.round(base.x*2)/2;
  base.y = Math.max(1.2, Math.round(base.y*2)/2);
  base.z = Math.round(base.z*2)/2;
  const activeLayer = APP.layers.find(l=>l.id===APP.activeLayerId)||APP.layers[2];
  const pos = findFreePosition(base, activeLayer.z);
  openNoteModal(pos);
});

renderer.domElement.addEventListener('mousedown', e => {
  if(e.button!==0) return;
  if(APP.mode==='draw'){ startDraw(e); return; }
  setNDC(e); rc.setFromCamera(mouse,camera);
  const hits = rc.intersectObjects(noteMeshes(),false);
  if(!hits.length) return;
  dragTarget = APP.notes.find(n=>n.mesh===hits[0].object);
  if(!dragTarget) return;
  orbit.enabled = false;
  const cd=new THREE.Vector3(); camera.getWorldDirection(cd);
  dragPlane.setFromNormalAndCoplanarPoint(cd, dragTarget.mesh.position);
  dragOffset.copy(hits[0].point).sub(dragTarget.mesh.position);
  dragTarget.mesh.scale.setScalar(1.06);
  hideCtx();
});

renderer.domElement.addEventListener('mousemove', e => {
  if(APP.mode==='draw' && isDrawing){ continueDraw(e); return; }
  if(!dragTarget) return;
  setNDC(e); rc.setFromCamera(mouse,camera);
  const hit=new THREE.Vector3();
  if(rc.ray.intersectPlane(dragPlane,hit)){
    dragTarget.mesh.position.copy(hit.sub(dragOffset));
    updateFade();
  }
});

renderer.domElement.addEventListener('mouseup', e => {
  if(APP.mode==='draw'&&isDrawing){ endDraw(); return; }
  if(dragTarget){
    dragTarget.mesh.scale.setScalar(dragTarget._baseScale||1);
    const sp = dragTarget._dragStartPos;
    if(sp && dragTarget.mesh.position.distanceTo(sp) > 0.1) {
      // Update savedPosition so restore goes to new spot
      if(currentView !== 'free') savedPositions[dragTarget.id] = {
        x: savedPositions[dragTarget.id]?.x ?? dragTarget.mesh.position.x,
        y: savedPositions[dragTarget.id]?.y ?? dragTarget.mesh.position.y,
        z: savedPositions[dragTarget.id]?.z ?? dragTarget.mesh.position.z,
      };
      pushHistory({type:'MOVE_NOTE', noteId:dragTarget.id,
        prevPos:[sp.x,sp.y,sp.z]});
    }
    dragTarget._dragStartPos = null;
    dragTarget=null;
    if(currentView === 'free') orbit.enabled=true;
  }
});

renderer.domElement.addEventListener('contextmenu', e => {
  e.preventDefault();
  setNDC(e); rc.setFromCamera(mouse,camera);
  const hits = rc.intersectObjects(noteMeshes(),false);
  if(!hits.length){ hideCtx(); return; }
  window._ctxNote = APP.notes.find(n=>n.mesh===hits[0].object);
  const ctx = document.getElementById('ctx');
  ctx.style.display='block'; ctx.style.left=e.clientX+'px'; ctx.style.top=e.clientY+'px';
});

document.addEventListener('click', ()=>hideCtx());

// ═══════════════════════════════════════════════════════════════
// DRAW LINES
// ═══════════════════════════════════════════════════════════════
function startDraw(e){
  isDrawing=true; orbit.enabled=false; drawPts=[];
  setNDC(e); const p=screenToWorld(); if(p) drawPts.push(p);
}
function continueDraw(e){
  if(!isDrawing) return; setNDC(e); const p=screenToWorld(); if(!p) return;
  drawPts.push(p);
  if(liveDrawLine){ scene.remove(liveDrawLine); liveDrawLine.geometry.dispose(); }
  if(drawPts.length<2) return;
  const pts=drawPts.filter((_,i)=>i%2===0);
  const layer = APP.layers.find(l=>l.id===APP.activeLayerId);
  liveDrawLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:new THREE.Color(layer?.color||'#4a9eff'),transparent:true,opacity:0.75,linewidth:2})
  );
  scene.add(liveDrawLine);
}
function endDraw(){
  isDrawing=false; orbit.enabled=true;
  if(liveDrawLine && drawPts.length>1){
    APP.lines.push({line:liveDrawLine});
    pushHistory({type:'ADD_LINE'});
    liveDrawLine=null;
  } else if(liveDrawLine){ scene.remove(liveDrawLine); }
  liveDrawLine=null; drawPts=[];
}
function screenToWorld(){
  rc.setFromCamera(mouse,camera);
  const pl=new THREE.Plane(new THREE.Vector3(0,0,1),0);
  const hit=new THREE.Vector3();
  if(rc.ray.intersectPlane(pl,hit)) return hit;
  return camera.position.clone().add(rc.ray.direction.clone().multiplyScalar(11));
}

// ═══════════════════════════════════════════════════════════════
// DEPTH FADE
// ═══════════════════════════════════════════════════════════════
function updateFade(){
  const {zFocus,zRange,focusMode} = APP;
  let vis=0;
  APP.notes.forEach(n=>{
    // In flat views: MeshBasicMaterial handles brightness; just skip fade
    if(currentView !== 'free'){ vis++; return; }
    const z=n.mesh.position.z;
    const dist=Math.abs(z-zFocus);
    const fade = (!focusMode||zRange>=30) ? 1 : Math.max(0.07, 1-(dist/(zRange/2+.001))*0.93);
    n.mesh.material.forEach(m=>{ m.transparent=true; m.opacity=fade; });
    n.ring.material.opacity=fade*0.55;
    n.mesh.children.forEach(c=>{ if(c.isMesh){ c.material.transparent=true; c.material.opacity=fade*0.9; }});
    if(fade>0.3) vis++;
  });
  APP.lines.forEach(l=>{ l.line.material.opacity = focusMode ? 0.2 : 0.65; });
  APP.layers.forEach(layer=>{
    if(!layer._plane) return;
    const dist=Math.abs(layer.z-zFocus);
    layer._plane.material.opacity = focusMode ? Math.max(0.01,0.1-dist*0.007) : 0.05;
    layer._sprite.material.opacity = focusMode ? Math.max(0.05,0.5-dist*0.04) : 0.3;
  });
  const vc=document.querySelector('#lp-head span');
  if(vc){ /* subtle update */ }
  renderLayerPanel();
}

// ═══════════════════════════════════════════════════════════════
// CAMERA ANIMATION (smooth fly-to)
// ═══════════════════════════════════════════════════════════════
let camAnim=null;
function flyTo(targetPos, targetLook, duration=1.4){
  const startPos=camera.position.clone();
  const startLook=orbit.target.clone();
  let t=0;
  camAnim && cancelAnimationFrame(camAnim);
  orbit.enabled=false;
  function step(){
    t+=0.016/duration;
    const k=t<1 ? 1-Math.pow(1-Math.min(t,1),4) : 1;
    camera.position.lerpVectors(startPos,targetPos,k);
    orbit.target.lerpVectors(startLook,targetLook,k);
    orbit.update();
    if(t<1) camAnim=requestAnimationFrame(step);
    else { orbit.enabled = APP.mode==='select'; camAnim=null; }
  }
  step();
}

// ═══════════════════════════════════════════════════════════════
// FLAT VIEW SYSTEM  (XY / ZY / ZX)
// ═══════════════════════════════════════════════════════════════
let currentView = 'free';
let savedPositions = {}; // noteId -> {x,y,z} before flattening

// Compute the "ideal" flat position for a note given view mode
function flatPos(noteObj, mode) {
  const cat  = CATEGORIES[noteObj.data?.category]  || CATEGORIES.ux;
  const pri  = PRIORITIES[noteObj.data?.priority]  || PRIORITIES.should;
  const layer= APP.layers.find(l=>l.id===noteObj.layerId) || APP.layers[2];

  // Add small per-note jitter so stacked notes spread slightly
  const jx = (noteObj.id % 7 - 3) * 0.28;
  const jy = (noteObj.id % 5 - 2) * 0.22;

  switch(mode){
    case 'xy':
      // X=category, Y=priority, Z=0 (collapse depth)
      return { x: cat.x + jx, y: pri.y + jy, z: 0 };
    case 'zy':
      // X=0 (collapse category), Y=priority, Z=layer.z
      return { x: 0, y: pri.y + jy, z: layer.z + (noteObj.id%3-1)*0.3 };
    case 'zx':
      // X=category, Y=0 (collapse priority), Z=layer.z
      return { x: cat.x + jx, y: 1.8, z: layer.z + (noteObj.id%3-1)*0.3 };
    case 'flat': {
      // Count notes in same category with lower id to get row index
      const sameCat = APP.notes.filter(nn => (nn.data?.category || 'ux') === (noteObj.data?.category || 'ux'));
      const idx = sameCat.indexOf(noteObj);
      const row = idx >= 0 ? idx : 0;
      const totalRows = sameCat.length;
      // Stack vertically: top starts at y=7, each note 2.4 units apart
      const startY = 7;
      const spacing = 2.4;
      const y = startY - row * spacing;
      return { x: cat.x, y: y, z: 0 };
    }
    default:
      return null;
  }
}

// ── GROUP KEY: which notes land on the same cell in each view ─
function groupKey(noteObj, mode) {
  const cat   = noteObj.data?.category || 'ux';
  const pri   = noteObj.data?.priority || 'should';
  const layer = noteObj.layerId || 'l2';
  switch(mode){
    case 'xy': return `${cat}__${pri}`;          // same category + priority
    case 'zy': return `${layer}__${pri}`;        // same depth + priority
    case 'zx': return `${cat}__${layer}`;        // same category + depth
    case 'flat': return `flat__${noteObj.id}`;  // unique key = no stacking
    default:   return null;
  }
}

// Make a "stacked" badge texture showing count + top title
function makeStackTexture(notes, color, brighten=0) {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const ctx = c.getContext('2d');
  const hex = color.replace('#','');
  let r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  r=Math.min(255,r+brighten); g=Math.min(255,g+brighten); b=Math.min(255,b+brighten);

  // Background (same style as regular note)
  function rr(x,y,w,h,rad){
    ctx.beginPath();ctx.moveTo(x+rad,y);ctx.lineTo(x+w-rad,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+rad);ctx.lineTo(x+w,y+h-rad);
    ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);ctx.lineTo(x+rad,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-rad);ctx.lineTo(x,y+rad);
    ctx.quadraticCurveTo(x,y,x+rad,y);ctx.closePath();
  }
  const gr = ctx.createLinearGradient(24,24,512,512);
  gr.addColorStop(0,`rgba(${Math.min(255,r+30)},${Math.min(255,g+30)},${Math.min(255,b+30)},0.96)`);
  gr.addColorStop(1,`rgba(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)},0.88)`);
  rr(ctx,24,24,464,464,38); ctx.fillStyle=gr; ctx.fill();

  // Gloss
  const gloss=ctx.createLinearGradient(0,24,0,180);
  gloss.addColorStop(0,'rgba(255,255,255,0.35)'); gloss.addColorStop(1,'rgba(255,255,255,0)');
  rr(ctx,24,24,464,220,38); ctx.fillStyle=gloss; ctx.fill();

  // Border
  rr(ctx,24,24,464,464,38);
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=2; ctx.stroke();

  // Count badge (top-right circle)
  const cnt = notes.length;
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.arc(400,88,60,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(20,20,20,0.95)';
  ctx.font='bold 58px "Segoe UI",Arial,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(cnt, 400, 88);

  // Top note title
  ctx.fillStyle='rgba(20,20,20,0.95)';
  ctx.font='bold 44px "Segoe UI",Arial,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const title = notes[0].data?.title || '...';
  // Truncate if long
  let t = title; if(ctx.measureText(t).width > 420) t = t.slice(0,18)+'…';
  ctx.fillText(t, 256, 210);

  // Sub-titles (up to 2 more)
  ctx.fillStyle='rgba(20,20,20,0.6)';
  ctx.font='28px "Segoe UI",Arial,sans-serif';
  notes.slice(1,3).forEach((n2,i)=>{
    let sub = n2.data?.title||''; if(ctx.measureText(sub).width>400) sub=sub.slice(0,22)+'…';
    ctx.fillText(sub, 256, 310 + i*52);
  });
  if(cnt > 3){
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.font='24px "Segoe UI",Arial,sans-serif';
    ctx.fillText(`+ ${cnt-3} 件`, 256, 420);
  }

  return new THREE.CanvasTexture(c);
}

// State for hidden notes and stack meshes
let hiddenNotes = []; // [{noteObj, wasVisible}]
let stackMeshes = []; // [{mesh, tex, notes}]

function clearStacks() {
  stackMeshes.forEach(s => { scene.remove(s.mesh); s.tex.dispose(); });
  stackMeshes = [];
  hiddenNotes.forEach(h => { h.noteObj.mesh.visible = true; });
  hiddenNotes = [];
}

function buildStacks(mode) {
  clearStacks();

  // Group notes by key
  const groups = {};
  APP.notes.forEach(n => {
    const key = groupKey(n, mode);
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    groups[key].push(n);
  });

  Object.values(groups).forEach(group => {
    if (group.length <= 1) return; // no stacking needed

    // Representative = first note (stays visible, gets stack texture)
    const rep = group[0];

    // Hide all but representative
    group.slice(1).forEach(n => {
      n.mesh.visible = false;
      hiddenNotes.push({noteObj: n});
    });

    // Replace representative's face texture with stacked texture
    // Use viewColor so stack texture matches the MeshBasicMaterial color
    const layer = APP.layers.find(l=>l.id===rep.layerId)||APP.layers[2];
    const stackColor = (currentView !== 'free') ? (viewColor(rep, currentView) || layer.color) : layer.color;
    const brighten = (currentView !== 'free') ? 40 : 0;
    const stackTex = makeStackTexture(group, stackColor, brighten);
    const oldMap = rep.mesh.material[4].map;
    rep.mesh.material[4].map = stackTex;
    rep.mesh.material[4].needsUpdate = true;
    // Store for cleanup
    stackMeshes.push({ mesh: rep.mesh, tex: stackTex, oldMap, rep, group });
  });
}

function restoreStacks() {
  // Restore original textures on representative notes
  stackMeshes.forEach(s => {
    s.mesh.material[4].map = s.oldMap;
    s.mesh.material[4].needsUpdate = true;
    s.tex.dispose();
  });
  stackMeshes = [];
  // Show hidden notes again
  hiddenNotes.forEach(h => { h.noteObj.mesh.visible = true; });
  hiddenNotes = [];
}

// Animate all notes to their flat positions

// Animate note rotation to target euler angles
// Smoothly animate a note's rotation to target angles
function animateRotation(n, targetX, targetY, targetZ, duration=0.7){
  const startX = n.mesh.rotation.x;
  const startY = n.mesh.rotation.y;
  const startZ = n.mesh.rotation.z;
  let t = 0;
  const speed = 0.03 / duration;
  n._rotAnimId && cancelAnimationFrame(n._rotAnimId);
  (function tick(){
    t = Math.min(t + speed, 1);
    const k = 1 - Math.pow(1 - t, 3);
    n.mesh.rotation.x = startX + (targetX - startX) * k;
    n.mesh.rotation.y = startY + (targetY - startY) * k;
    n.mesh.rotation.z = startZ + (targetZ - startZ) * k;
    if(t < 1){ n._rotAnimId = requestAnimationFrame(tick); }
    else {
      n.mesh.rotation.set(targetX, targetY, targetZ);
      n._flatRotation = {x: targetX, y: targetY, z: targetZ};
      n._rotAnimId = null;
    }
  })();
}

// Target rotation per view so card FACE (material index 4, normal = Z+) points at camera
// xy : camera at (0,4,+32)  → card face toward +Z → rotation (0, 0, 0)
// zy : camera at (+28,4,0)  → need face toward +X → rotate Y = +PI/2
// zx : camera at (0,+34,0)  → need face toward +Y → rotate X = -PI/2
function targetRotation(mode){
  switch(mode){
    case 'xy':  return { x: 0,            y: 0,           z: 0 };
    case 'zy':  return { x: 0,            y: Math.PI/2,   z: 0 };
    case 'zx':  return { x: -Math.PI/2,   y: 0,           z: 0 };
    case 'flat': return { x: 0, y: 0, z: 0 };  // face toward +Z like xy view
    default:    return null;
  }
}

function enterFlatView(mode) {
  // Save current 3D positions
  APP.notes.forEach(n => {
    savedPositions[n.id] = {
      x: n.mesh.position.x,
      y: n.mesh.position.y,
      z: n.mesh.position.z
    };
  });

  // Animate each note to flat pos + rotate to face camera
  const rot = targetRotation(mode);
  APP.notes.forEach(n => {
    const target = flatPos(n, mode);
    if (!target) return;
    const start = { x: n.mesh.position.x, y: n.mesh.position.y, z: n.mesh.position.z };
    let t = 0;
    (function tick(){
      t = Math.min(t + 0.035, 1);
      const k = 1 - Math.pow(1-t, 3);
      n.mesh.position.x = start.x + (target.x - start.x) * k;
      n.mesh.position.y = start.y + (target.y - start.y) * k;
      n.mesh.position.z = start.z + (target.z - start.z) * k;
      if(t < 1) requestAnimationFrame(tick);
    })();
    // Animate rotation with slight delay so position starts first
    if(rot) setTimeout(() => animateRotation(n, rot.x, rot.y, rot.z), 150);
  });

  // Fly camera to best viewpoint for this mode
  const camMap = {
    xy: { pos: new THREE.Vector3(0, 4, 32),  look: new THREE.Vector3(0, 3, 0) },
    zy: { pos: new THREE.Vector3(28, 4, 0),  look: new THREE.Vector3(0, 3, 0) },
    zx: { pos: new THREE.Vector3(0, 34, 0),  look: new THREE.Vector3(0, 0, 0) },
    flat: { pos: new THREE.Vector3(0, 2, 38),  look: new THREE.Vector3(0, 2, 0) },
  };
  const cam = camMap[mode];
  if (cam) flyTo(cam.pos, cam.look, 1.1);

  // Activate fill light: position slightly *in front of* camera so it shines onto card faces
  // Camera looks toward origin; light placed between camera and cards
  const fillPos = { xy:[0,4,20], zy:[18,4,0], zx:[0,22,0], flat:[0,2,26] }[mode] || [0,4,20];
  fillLight.position.set(...fillPos);
  fillLight.target.position.set(0, 2, 0);
  scene.add(fillLight.target);
  fillLight.intensity = 2.8;
  sun.intensity = 0.2;

  // Disable orbit during flat view to keep alignment clean
  setTimeout(() => { orbit.enabled = false; }, 50);

  // Build stacks + recolor after notes have moved into position
  setTimeout(() => {
    // Force full opacity + emissive so cards are always bright in flat view
    APP.notes.forEach(n => {
      n.mesh.material.forEach((m, i) => {
        m.transparent = false; m.opacity = 1;
        m.roughness = 1.0; m.metalness = 0;
        if(m.emissive) {
          if(i !== 4) { m.color.set(new THREE.Color(0xdddddd)); m.emissive.set(new THREE.Color(0x888888)); }
          else { m.emissive.set(new THREE.Color(0x666666)); }
          m.emissiveIntensity = 1;
        } else if(i !== 4) {
          m.color.set(new THREE.Color(0xdddddd));
        }
        m.needsUpdate = true;
      });
      n.ring.material.opacity = 0.5;
      n.mesh.children.forEach(c => {
        if(c.isMesh){
          c.material.transparent = false; c.material.opacity = 1;
          if(c.material.emissive){ c.material.emissive.set(new THREE.Color(0x444444)); c.material.emissiveIntensity=1; }
          else { c.material.color && c.material.color.set(new THREE.Color(0xdddddd)); }
        }
      });
    });
    recolorForView(mode);
    buildStacks(mode);
  }, 650);

  currentView = mode;
  updateViewBtns();
}

function exitFlatView() {
  if (currentView === 'free') return;

  // Restore material properties, colors + stacked textures before moving notes back
  APP.notes.forEach(n => {
    n.mesh.material.forEach((m, i) => {
      m.roughness = i===4 ? 0.22 : 0.42;
      m.metalness = i===4 ? 0.05 : 0.18;
      if(m.emissive){ m.emissive.set(new THREE.Color(0x000000)); m.emissiveIntensity=0; }
      m.needsUpdate = true;
    });
    n.ring.material.opacity = 0.55;
    n.mesh.children.forEach(c=>{
      if(c.isMesh){
        if(c.material.emissive){ c.material.emissive.set(new THREE.Color(0)); c.material.emissiveIntensity=0; }
      }
    });
  });
  recolorRestore();
  restoreStacks();

  // Restore saved 3D positions + rotation
  APP.notes.forEach(n => {
    const saved = savedPositions[n.id];
    if (!saved) return;
    const start = { x: n.mesh.position.x, y: n.mesh.position.y, z: n.mesh.position.z };
    let t = 0;
    (function tick(){
      t = Math.min(t + 0.03, 1);
      const k = 1 - Math.pow(1-t, 3);
      n.mesh.position.x = start.x + (saved.x - start.x) * k;
      n.mesh.position.y = start.y + (saved.y - start.y) * k;
      n.mesh.position.z = start.z + (saved.z - start.z) * k;
      if(t < 1) requestAnimationFrame(tick);
    })();
    // Clear flat lock first so animate loop stops overriding, then animate back
    n._flatRotation = null;
    animateRotation(n, 0, 0, 0, 0.8);
  });
  savedPositions = {};

  // Restore lights
  fillLight.intensity = 0;
  sun.intensity = 1.1;

  // Fly back to 3D view
  flyTo(new THREE.Vector3(0, 28, 38), new THREE.Vector3(0, 0, 0), 1.1);
  setTimeout(() => { orbit.enabled = APP.mode === 'select'; }, 1200);

  currentView = 'free';
  updateViewBtns();
}

function setView(mode) {
  if (mode === currentView) return;
  if (mode === 'free') {
    exitFlatView();
  } else {
    // If already in another flat view, go directly
    if (currentView !== 'free') {
      // Animate to new flat positions without restoring first
      const rot2 = targetRotation(mode);
      APP.notes.forEach(n => {
        const target = flatPos(n, mode);
        if (!target) return;
        const start = { x: n.mesh.position.x, y: n.mesh.position.y, z: n.mesh.position.z };
        let t = 0;
        (function tick(){
          t = Math.min(t + 0.035, 1);
          const k = 1 - Math.pow(1-t, 3);
          n.mesh.position.x = start.x + (target.x - start.x) * k;
          n.mesh.position.y = start.y + (target.y - start.y) * k;
          n.mesh.position.z = start.z + (target.z - start.z) * k;
          if(t < 1) requestAnimationFrame(tick);
        })();
        if(rot2) setTimeout(() => animateRotation(n, rot2.x, rot2.y, rot2.z), 100);
      });
      const camMap = {
        xy: { pos: new THREE.Vector3(0, 4, 32),  look: new THREE.Vector3(0, 3, 0) },
        zy: { pos: new THREE.Vector3(28, 4, 0),  look: new THREE.Vector3(0, 3, 0) },
        zx: { pos: new THREE.Vector3(0, 34, 0),  look: new THREE.Vector3(0, 0, 0) },
        flat: { pos: new THREE.Vector3(0, 2, 38),  look: new THREE.Vector3(0, 2, 0) },
      };
      const cam = camMap[mode];
      if (cam) flyTo(cam.pos, cam.look, 0.9);
      // Update fill light for new camera direction
      const fp2 = { xy:[0,4,20], zy:[18,4,0], zx:[0,22,0], flat:[0,2,26] }[mode] || [0,4,20];
      fillLight.position.set(...fp2);
      fillLight.target.position.set(0, 2, 0);
      fillLight.intensity = 2.8;
      sun.intensity = 0.2;
      // Rebuild stacks + recolor for new mode
      recolorRestore(); // exits BasicMaterial
      restoreStacks();
      setTimeout(() => {
        recolorForView(mode);
        buildStacks(mode);
      }, 600);
      currentView = mode;
      updateViewBtns();
    } else {
      enterFlatView(mode);
    }
  }

  // Show axis hint toast
  const hints = {
    xy: 'Category × Priority ビュー — X:カテゴリー / Y:重要度',
    zy: 'Depth × Priority ビュー — Z:抽象度 / Y:重要度',
    zx: 'Depth × Category ビュー — Z:抽象度 / X:カテゴリー',
    flat: 'Flat List ビュー — カテゴリごとに全ノート一覧',
    free: '3Dビューに戻りました',
  };
  toast(hints[mode] || '', 'info');
}

function updateViewBtns() {
  ['free','flat'].forEach(id => {
    const btn = document.getElementById('vbtn-' + id);
    if (btn) btn.classList.toggle('active', id === currentView);
  });
}

// LAYER PANEL UI
// ═══════════════════════════════════════════════════════════════
function renderLayerPanel(){
  const list=document.getElementById('layers-list');
  list.innerHTML='';
  APP.layers.forEach(layer=>{
    const count=APP.notes.filter(n=>n.layerId===layer.id).length;
    const el=document.createElement('div');
    el.className='layer-item'+(layer.id===APP.activeLayerId?' active':'');
    el.innerHTML=`
      <div class="l-dot" style="background:${layer.color};color:${layer.color}"></div>
      <input class="l-label" value="${layer.label}" data-id="${layer.id}">
      <span class="l-z">Z:${layer.z>0?'+':''}${layer.z}</span>
      <span class="l-count">${count}</span>
      <button class="l-del" data-id="${layer.id}">✕</button>
    `;
    el.addEventListener('click', e=>{
      if(e.target.classList.contains('l-label')||e.target.classList.contains('l-del')) return;
      APP.activeLayerId = layer.id;
      APP.zFocus = layer.z;
      document.getElementById('zf-sl').value = layer.z;
      document.getElementById('zf-val').textContent = layer.z;

      if(APP.poppedLayerId === layer.id) {
        // Second click on same layer → restore everything
        restoreAllPop();
        APP.focusMode = false;
        document.getElementById('t-focus').classList.remove('active');
        document.getElementById('mode-badge').className='';
        updateFade();
        renderLayerPanel();
        toast(`${layer.label} を元の位置に戻しました`, 'info');
      } else {
        // First click → pop this layer's cards forward
        // Restore previous pop first
        if(APP.poppedLayerId) restoreAllPop();
        APP.poppedLayerId = layer.id;
        popLayer(layer.id);
        // Show X scroll slider
        document.getElementById('x-scroll-row').style.display='';
        document.getElementById('xs-sl').value=0;
        document.getElementById('xs-val').textContent='0';
        // Fly camera closer to see popped cards clearly
        if(currentView === 'free') {
          flyTo(new THREE.Vector3(0, 2, 26), new THREE.Vector3(0, 2, 20), 0.9);
        }
        // Mild focus (fade others slightly)
        APP.focusMode = true;
        APP.zRange = 14;
        document.getElementById('zr-sl').value = 14;
        document.getElementById('zr-val').textContent = '14.0';
        document.getElementById('t-focus').classList.add('active');
        document.getElementById('mode-badge').className='show focus';
        document.getElementById('mode-badge').textContent=`◎ ${layer.label} — カード引き出し中`;
        updateFade();
        renderLayerPanel();
        toast(`${layer.label} を手前に引き出しました — もう一度クリックで戻す`, 'ok');
      }
    });
    el.querySelector('.l-label').addEventListener('change', e=>{
      layer.label=e.target.value; renderLayerPanel();
    });
    el.querySelector('.l-del').addEventListener('click', e=>{
      e.stopPropagation();
      if(APP.layers.length<=1) return;
      if(!confirm(`"${layer.label}" を削除？`)) return;
      APP.notes.filter(n=>n.layerId===layer.id).forEach(n=>{ n.layerId='l2'; n.data.layerId='l2'; });
      APP.layers.splice(APP.layers.indexOf(layer),1);
      if(APP.activeLayerId===layer.id) APP.activeLayerId=APP.layers[0].id;
      renderLayerPanel();
    });
    list.appendChild(el);
  });
}

function addLayer(){
  const z=APP.layers.reduce((mn,l)=>Math.min(mn,l.z),Infinity)-5;
  const colors=['#c678dd','#56b6c2','#d19a66','#e5c07b','#abb2bf'];
  APP.layers.push({id:'l'+Date.now(),label:'New Layer',z:Math.max(-25,z),color:colors[APP.layers.length%colors.length]});
  renderLayerPanel();
}

// ④ Pop layer: animate matching notes toward camera, restore others
function popLayer(layerId) {
  // Target Z: just in front of camera (camera at Z=+24, pop to Z=+20)
  // Spread cards slightly on X so they don't stack on top of each other
  const TARGET_Z = 20;
  const popped = APP.notes.filter(n => n.layerId === layerId);
  const others = APP.notes.filter(n => n.layerId !== layerId);

  // Spread popped cards in a row at TARGET_Z
  const totalW = (popped.length - 1) * 3.2;
  popped.forEach((n, i) => {
    if (n._savedPopZ === undefined) {
      n._savedPopZ = n.mesh.position.z;
      n._savedPopX = n.mesh.position.x;
      n._savedPopY = n.mesh.position.y;
    }
    const targetX = -totalW/2 + i * 3.2;
    const targetY = 2;
    animateZ(n.mesh, TARGET_Z);
    animatePosXY(n.mesh, targetX, targetY);
    animateScale(n.mesh, 1.0); // pop to full size
  });

  // Push others slightly back
  others.forEach(n => {
    if (n._savedPopZ === undefined) n._savedPopZ = n.mesh.position.z;
    animateScale(n.mesh, (n._baseScale||1) * 0.85);
  });
}

function restoreAllPop() {
  APP.notes.forEach(n => {
    if (n._savedPopZ !== undefined) {
      animateZ(n.mesh, n._savedPopZ);
      n._savedPopZ = undefined;
    }
    if (n._savedPopX !== undefined) {
      animatePosXY(n.mesh, n._savedPopX, n._savedPopY);
      n._savedPopX = undefined; n._savedPopY = undefined;
    }
    animateScale(n.mesh, n._baseScale||1);
  });
  APP.poppedLayerId = null;
  // Hide X scroll slider
  const row = document.getElementById('x-scroll-row');
  if(row) row.style.display='none';
  const sl = document.getElementById('xs-sl');
  if(sl) sl.value=0;
}

// Smooth Z position animation
function animateZ(mesh, targetZ, duration=0.7) {
  const startZ = mesh.position.z;
  let t = 0;
  const speed = 0.025 / duration;
  (function tick(){
    t = Math.min(t + speed, 1);
    const k = 1 - Math.pow(1-t, 3);
    mesh.position.z = startZ + (targetZ - startZ) * k;
    if(t < 1) requestAnimationFrame(tick);
  })();
}

function animatePosXY(mesh, targetX, targetY, duration=0.7) {
  const startX = mesh.position.x, startY = mesh.position.y;
  let t = 0;
  const speed = 0.025 / duration;
  (function tick(){
    t = Math.min(t + speed, 1);
    const k = 1 - Math.pow(1-t, 3);
    mesh.position.x = startX + (targetX - startX) * k;
    mesh.position.y = startY + (targetY - startY) * k;
    if(t < 1) requestAnimationFrame(tick);
  })();
}

// Smooth scale animation
function animateScale(mesh, targetS, duration=0.5) {
  const startS = mesh.scale.x;
  let t = 0;
  const speed = 0.03 / duration;
  (function tick(){
    t = Math.min(t + speed, 1);
    const k = 1 - Math.pow(1-t, 3);
    const s = startS + (targetS - startS) * k;
    mesh.scale.setScalar(s);
    if(t < 1) requestAnimationFrame(tick);
  })();
}

function closeNoteModal(){
  document.getElementById('nm').classList.remove('open');

function confirmNote(){
  const title=document.getElementById('nm-title').value.trim()||'Untitled';
  const body=document.getElementById('nm-body').value.trim();
  const layerId=document.getElementById('nm-layer').value;
  const assign=document.getElementById('nm-assign').value.trim();
  const milestone=document.getElementById('nm-ms').value.trim();
  const category=document.getElementById('nm-category').value||'ux';
  const priority=document.getElementById('nm-priority').value||'should';
  const data={title,body,layerId,assign,milestone,category,priority};

  if(APP.editingNote){
    const prevData = {...APP.editingNote.data};
    const nid = APP.editingNote.id;
    APP.editingNote.data=data; APP.editingNote.layerId=layerId;
    // Reposition to new category/priority
    const cat=CATEGORIES[category]||CATEGORIES.ux;
    const pri=PRIORITIES[priority]||PRIORITIES.should;
    APP.editingNote.mesh.position.x = cat.x + (Math.random()-.5)*1.5;
    APP.editingNote.mesh.position.y = pri.y + (Math.random()-.5)*.6;
    rebuildNote(APP.editingNote);
    pushHistory({type:'EDIT_NOTE', noteId:nid, prevData});
    toast(`"${title}" 更新`, 'ok');
  } else {
    const layer=APP.layers.find(l=>l.id===layerId)||APP.layers[2];
    const cat=CATEGORIES[category]||CATEGORIES.ux;
    const pri=PRIORITIES[priority]||PRIORITIES.should;
    // Place at category X + priority Y + layer Z, then find free spot
    const basePos = new THREE.Vector3(
      cat.x + (Math.random()-.5)*1.5,
      pri.y + (Math.random()-.5)*.6,
      layer.z
    );
    const pos = findFreePosition(basePos, layer.z);
    pos.x = cat.x + (Math.random()-.5)*2.5; // keep in category zone
    pos.y = pri.y + (Math.random()-.5)*.8;   // keep in priority band
    createNote(pos,data);
  }
  closeNoteModal(); updateUI();
}

// Find a position that doesn't overlap existing notes (min distance 2.8 units)
function findFreePosition(basePos, targetZ) {
  const MIN_DIST = 2.8;
  const MAX_TRIES = 40;
  const candidate = basePos.clone();
  candidate.z = targetZ;
  candidate.y = Math.max(1.3, candidate.y);

  for (let attempt = 0; attempt < MAX_TRIES; attempt++) {
    const tooClose = APP.notes.some(n => {
      const dx = n.mesh.position.x - candidate.x;
      const dy = n.mesh.position.y - candidate.y;
      const dz = n.mesh.position.z - candidate.z;
      return Math.sqrt(dx*dx + dy*dy + dz*dz) < MIN_DIST;
    });
    if (!tooClose) return candidate;
    // Spiral outward: try increasing radius each attempt
    const angle = attempt * 2.399; // golden angle
    const radius = MIN_DIST * (0.5 + attempt * 0.18);
    candidate.x = basePos.x + Math.cos(angle) * radius;
    candidate.y = Math.max(1.3, basePos.y + Math.sin(angle) * radius * 0.4);
    candidate.z = targetZ + (Math.random() - 0.5) * 1.5;
  }
  // Fallback: just offset further out
  candidate.x = basePos.x + (Math.random() - 0.5) * 8;
  candidate.y = Math.max(1.3, basePos.y + 1);
  return candidate;
}

function addNoteAtCamera(){

  const pos = findFreePosition(base, layer.z);

document.getElementById('xs-sl').addEventListener('input', e => {
  const offset = parseFloat(e.target.value);
  document.getElementById('xs-val').textContent = offset.toFixed(1);
  if(!APP.poppedLayerId) return;
  // Shift all popped notes by offset around their spread center
  const popped = APP.notes.filter(n => n.layerId === APP.poppedLayerId);
  const total = popped.length;
  const totalW = (total - 1) * 3.2;
  popped.forEach((n, i) => {
    const baseX = -totalW/2 + i * 3.2;
    n.mesh.position.x = baseX + offset;
  });
});

document.getElementById('zf-sl').addEventListener('input',e=>{
  APP.zFocus=parseFloat(e.target.value);
  document.getElementById('zf-val').textContent=parseFloat(e.target.value).toFixed(1);
  updateFade();
});
document.getElementById('zr-sl').addEventListener('input',e=>{
  APP.zRange=parseFloat(e.target.value);
  document.getElementById('zr-val').textContent=parseFloat(e.target.value)>=30?'∞':parseFloat(e.target.value).toFixed(1);
  updateFade();
});
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  if((e.ctrlKey||e.metaKey) && (e.key==='z'||e.key==='Z')){ e.preventDefault(); undo(); return; }
  if(e.key==='1') setView('free');
  if(e.key==='2') setView('flat');
  if(e.key==='n'||e.key==='N') addNoteAtCamera();
  if(e.key==='d'||e.key==='D') setMode(APP.mode==='draw'?'select':'draw');
  if(e.key==='f'||e.key==='F') toggleFocusMode();
  if(e.key==='Escape'){
    setMode('select');
    if(APP.focusMode){ APP.focusMode=false; document.getElementById('t-focus').classList.remove('active'); document.getElementById('mode-badge').className=''; updateFade(); }
    closeGuide();
    if(APP.poppedLayerId){ restoreAllPop(); updateFade(); }
  }
});
window.addEventListener('resize',()=>{ camera.aspect=W()/H(); camera.updateProjectionMatrix(); renderer.setSize(W(),H()); });

// RENDER LOOP
// ═══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  orbit.update();
  APP.notes.forEach((n,i)=>{
    if(dragTarget!==n && currentView==='free')
      n.mesh.position.y += Math.sin(t*.65+i*1.3)*.00055;
    // Lock rotation in flat views; wobble only in free 3D
    if(currentView==='free'){
      n.mesh.rotation.y = Math.sin(t*.22+i*.75)*.022;
      // Ensure standard material is restored in 3D
      if(n._flatMats) exitFlatMaterial(n);
    } else {
      if(n._flatRotation){
        n.mesh.rotation.x = n._flatRotation.x;
        n.mesh.rotation.y = n._flatRotation.y;
        n.mesh.rotation.z = n._flatRotation.z;
      }
      // Ensure flat material is applied — catch any note that missed recolorForView
      if(!n._flatMats && n.mesh.visible) enterFlatMaterial(n, viewColor(n, currentView));
    }
    n.ring.rotation.z = t*.22+i*.55;
  });
  pl1.intensity = 2.2+Math.sin(t*.9)*.4;
  pl2.intensity = 1.4+Math.cos(t*1.1)*.3;
  particles.rotation.y = t*.0035;
  renderer.render(scene,camera);
}
